# Disable screen updates for background (unseen) windows
set-window-option -g aggressive-resize on
set-window-option -g automatic-rename off

# User app-launch shortcuts.
bind -n M-w run-shell 'tmux display-message "Opening WhatsApp"; launcherctl launch whatsapp >/dev/null 2>&1 || tmux display-message "Launch failed: WhatsApp"'
bind -n M-k run-shell 'tmux display-message "Opening komikku"; launcherctl launch komikku >/dev/null 2>&1 || tmux display-message "Launch failed: komikku"'
bind -n M-b run-shell 'tmux display-message "Opening cromite"; launcherctl launch cromite >/dev/null 2>&1 || tmux display-message "Launch failed: cromite"'
bind -n M-g run-shell 'tmux display-message "Opening gallery"; launcherctl launch gallery >/dev/null 2>&1 || tmux display-message "Launch failed: gallery"'
bind -n M-s run-shell 'tmux display-message "Opening settings"; launcherctl launch settings >/dev/null 2>&1 || tmux display-message "Launch failed: settings"'
bind -n M-r run-shell 'tmux display-message "Opening reddit"; launcherctl launch reddit >/dev/null 2>&1 || tmux display-message "Launch failed: reddit"'
bind -n M-i run-shell 'tmux display-message "Opening instagram"; launcherctl launch instagram >/dev/null 2>&1 || tmux display-message "Launch failed: instagram"'
bind -n M-f run-shell 'tmux display-message "Opening solidexplorer"; launcherctl launch solidexplorer >/dev/null 2>&1 || tmux display-message "Launch failed: solidexplorer"'
bind -n M-y run-shell 'tmux display-message "Opening youtube"; launcherctl launch youtube >/dev/null 2>&1 || tmux display-message "Launch failed: youtube"'

# Core widgets default to "on".
set -g @termux-launcher-tmux-system-widgets on
set -g @termux-launcher-tmux-weather on
set -g @termux-launcher-tmux-now-playing on

# Weather display: compact shows "󰖔 37°"; condition shows "󰖔 37° Sunny".
set -g @termux-launcher-tmux-weather-mode compact

# Extra resource widgets default to "off".
set -g @termux-launcher-tmux-storage-widget off
set -g @termux-launcher-tmux-battery-widget off
set -g @termux-launcher-tmux-cpu-temperature-widget off
set -g @termux-launcher-tmux-battery-temperature-widget off

set -g @plugin 'PickleHik3/termux-launcher-tmux'

run '~/.tmux/plugins/tpm/tpm'
