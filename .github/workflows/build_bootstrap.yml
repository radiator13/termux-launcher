name: Build standalone bootstrap (com.termux.launcher)

on:
  workflow_dispatch:
    inputs:
      bootstrap_tag:
        description: 'Release tag for bootstraps (e.g. 2026.02.12-r1)'
        required: true
        default: '2026.02.12-r1'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout termux-packages
        uses: actions/checkout@v4
        with:
          repository: termux/termux-packages
          path: termux-packages

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build standalone bootstraps (all architectures)
        working-directory: termux-packages
        run: |
          for ARCH in aarch64 arm i686 x86_64; do
            echo "Building bootstrap for $ARCH..."
            TERMUX_APP_PACKAGE=com.termux.launcher \
              ./scripts/run-docker.sh \
              ./scripts/build-bootstraps.sh --architectures "$ARCH"
          done

      - name: Collect and checksum bootstrap ZIPs
        working-directory: termux-packages
        run: |
          mkdir -p ../bootstrap-artifacts
          for ARCH in aarch64 arm i686 x86_64; do
            cp "bootstrap-${ARCH}.zip" ../bootstrap-artifacts/
            sha256sum "bootstrap-${ARCH}.zip" >> ../bootstrap-artifacts/sha256sums.txt
          done

      - name: Publish bootstraps as GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: bootstrap-standalone-${{ github.event.inputs.bootstrap_tag }}
          name: Standalone Bootstrap ${{ github.event.inputs.bootstrap_tag }}
          body: |
            Custom Termux bootstrap built with `TERMUX_APP_PACKAGE=com.termux.launcher`.
            Required prefix path: `/data/data/com.termux.launcher/files/usr`

            Use these with the `standalone-pkg` branch of termux-launcher by setting:
            ```
            TERMUX_STANDALONE_BOOTSTRAP_VERSION=${{ github.event.inputs.bootstrap_tag }}
            TERMUX_BOOTSTRAP_RELEASES_BASE_URL=https://github.com/${{ github.repository }}/releases/download
            BOOTSTRAP_CHECKSUM_AARCH64=<from sha256sums.txt>
            BOOTSTRAP_CHECKSUM_ARM=<from sha256sums.txt>
            BOOTSTRAP_CHECKSUM_I686=<from sha256sums.txt>
            BOOTSTRAP_CHECKSUM_X86_64=<from sha256sums.txt>
            ```
          files: |
            bootstrap-artifacts/bootstrap-aarch64.zip
            bootstrap-artifacts/bootstrap-arm.zip
            bootstrap-artifacts/bootstrap-i686.zip
            bootstrap-artifacts/bootstrap-x86_64.zip
            bootstrap-artifacts/sha256sums.txt
