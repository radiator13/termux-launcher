name: Attach Debug APKs To Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing release tag to upload APKs to (for example: v0.1.1)'
        required: false
        type: string

jobs:
  attach-apks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package_variant: [ apt-android-7 ]
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Clone repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.GITHUB_REF }}

      - name: Setup java 21 as required by gradle
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build and attach APKs to release
        shell: bash {0}
        env:
          PACKAGE_VARIANT: ${{ matrix.package_variant }}
          RELEASE_TAG_INPUT: ${{ github.event.inputs.release_tag }}
          TERMUX_RELEASE_STORE_FILE: ${{ secrets.TERMUX_RELEASE_STORE_FILE }}
          TERMUX_RELEASE_STORE_PASSWORD: ${{ secrets.TERMUX_RELEASE_STORE_PASSWORD }}
          TERMUX_RELEASE_KEY_ALIAS: ${{ secrets.TERMUX_RELEASE_KEY_ALIAS }}
          TERMUX_RELEASE_KEY_PASSWORD: ${{ secrets.TERMUX_RELEASE_KEY_PASSWORD }}
        run: |
          exit_on_error() {
              echo "$1"
              echo "Release workflow aborted. Existing release/tag (if any) were left unchanged."
              exit 1
          }

          echo "Setting vars"
          RELEASE_VERSION_NAME="${GITHUB_REF/refs\/tags\//}"
          if [ -n "$RELEASE_TAG_INPUT" ]; then
            RELEASE_VERSION_NAME="$RELEASE_TAG_INPUT"
          fi
          RELEASE_VERSION_PLAIN="${RELEASE_VERSION_NAME/v/}"
          CURRENT_VERSION_NAME_REGEX='\s+versionName "([^"]+)"$'
          CURRENT_VERSION_NAME="$(grep -m 1 -E "$CURRENT_VERSION_NAME_REGEX" ./app/build.gradle | sed -r "s/$CURRENT_VERSION_NAME_REGEX/\1/")"

          if [ "$RELEASE_VERSION_PLAIN" != "$CURRENT_VERSION_NAME" ]; then
            exit_on_error "Release tag '$RELEASE_VERSION_PLAIN' does not match app/build.gradle versionName '$CURRENT_VERSION_NAME'."
          fi

          HAS_RELEASE_SIGNING=1
          for env_var in TERMUX_RELEASE_STORE_FILE TERMUX_RELEASE_STORE_PASSWORD TERMUX_RELEASE_KEY_ALIAS TERMUX_RELEASE_KEY_PASSWORD; do
            if [ -z "${!env_var}" ]; then
              HAS_RELEASE_SIGNING=0
            fi
          done
          if [ "$HAS_RELEASE_SIGNING" -eq 0 ]; then
            echo "Release signing secrets not set; continuing with debug APK attachment flow only."
          fi

          RELEASE_BODY="$(gh release view "$RELEASE_VERSION_NAME" --json body --jq '.body' | tr -d '[:space:]')"
          if [ -z "$RELEASE_BODY" ]; then
            exit_on_error "Release notes are empty for '$RELEASE_VERSION_NAME'. Add changelog/release notes before attaching APKs."
          fi

          if ! printf "%s" "${RELEASE_VERSION_NAME/v/}" | grep -qP '^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\.(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\+([0-9a-zA-Z-]+(?:\.[0-9a-zA-Z-]+)*))?$'; then
           exit_on_error "The versionName '${RELEASE_VERSION_NAME/v/}' is not a valid version as per semantic version '2.0.0' spec in the format 'major.minor.patch(-prerelease)(+buildmetadata)'. https://semver.org/spec/v2.0.0.html."
          fi

          APK_DIR_PATH="./app/build/outputs/apk/debug"
          APK_VERSION_TAG="$RELEASE_VERSION_NAME+$PACKAGE_VARIANT-github-debug"
          APK_BASENAME_PREFIX="termux-app_$APK_VERSION_TAG"

          export TERMUX_RELEASE_STORE_FILE="${TERMUX_RELEASE_STORE_FILE}"
          export TERMUX_RELEASE_STORE_PASSWORD="${TERMUX_RELEASE_STORE_PASSWORD}"
          export TERMUX_RELEASE_KEY_ALIAS="${TERMUX_RELEASE_KEY_ALIAS}"
          export TERMUX_RELEASE_KEY_PASSWORD="${TERMUX_RELEASE_KEY_PASSWORD}"

          echo "Building APKs for 'APK_VERSION_TAG' release"
          export TERMUX_APK_VERSION_TAG="$APK_VERSION_TAG" # Used by app/build.gradle
          export TERMUX_PACKAGE_VARIANT="$PACKAGE_VARIANT" # Used by app/build.gradle
          if ! ./gradlew :app:verifyReleaseHardening :app:processReleaseMainManifest; then
            exit_on_error "Release hardening checks failed."
          fi
          RELEASE_MANIFEST_PATH="$(find ./app/build/intermediates -name AndroidManifest.xml | grep -E '/release(/|$)' | head -n 1)"
          if [ -z "$RELEASE_MANIFEST_PATH" ] || ! test -f "$RELEASE_MANIFEST_PATH"; then
            exit_on_error "Could not locate merged release manifest for non-debuggable validation."
          fi
          if grep -q 'android:debuggable="true"' "$RELEASE_MANIFEST_PATH"; then
            exit_on_error "Merged release manifest is debuggable: $RELEASE_MANIFEST_PATH"
          fi
          if ! ./gradlew assembleDebug; then
            exit_on_error "Build failed for '$APK_VERSION_TAG' release."
          fi

          echo "Validating APKs"
          for abi in universal arm64-v8a armeabi-v7a x86_64 x86; do
            if ! test -f "$APK_DIR_PATH/${APK_BASENAME_PREFIX}_$abi.apk"; then
              files_found="$(ls "$APK_DIR_PATH")"
              exit_on_error "Failed to find built APK at '$APK_DIR_PATH/${APK_BASENAME_PREFIX}_$abi.apk'. Files found: "$'\n'"$files_found"
            fi
          done

          echo "Generating sha25sums file"
          if ! (cd "$APK_DIR_PATH"; sha256sum \
            "${APK_BASENAME_PREFIX}_universal.apk" \
            "${APK_BASENAME_PREFIX}_arm64-v8a.apk" \
            "${APK_BASENAME_PREFIX}_armeabi-v7a.apk" \
            "${APK_BASENAME_PREFIX}_x86_64.apk" \
            "${APK_BASENAME_PREFIX}_x86.apk" \
            > "${APK_BASENAME_PREFIX}_sha256sums"); then
            exit_on_error "Generate sha25sums failed for '$APK_VERSION_TAG' release."
          fi

          echo "Attaching APKs to github release"
          ASSETS_TO_UPLOAD=(
            "${APK_BASENAME_PREFIX}_universal.apk"
            "${APK_BASENAME_PREFIX}_arm64-v8a.apk"
            "${APK_BASENAME_PREFIX}_armeabi-v7a.apk"
            "${APK_BASENAME_PREFIX}_x86_64.apk"
            "${APK_BASENAME_PREFIX}_x86.apk"
            "${APK_BASENAME_PREFIX}_sha256sums"
          )

          for asset_name in "${ASSETS_TO_UPLOAD[@]}"; do
            if gh release view "$RELEASE_VERSION_NAME" --json assets --jq '.assets[].name' | grep -Fxq "$asset_name"; then
              echo "Deleting existing asset: $asset_name"
              if ! gh release delete-asset "$RELEASE_VERSION_NAME" "$asset_name" --yes; then
                exit_on_error "Failed to delete existing release asset '$asset_name'."
              fi
            fi
          done

          if ! gh release upload "$RELEASE_VERSION_NAME" \
            "$APK_DIR_PATH/${APK_BASENAME_PREFIX}_universal.apk" \
            "$APK_DIR_PATH/${APK_BASENAME_PREFIX}_arm64-v8a.apk" \
            "$APK_DIR_PATH/${APK_BASENAME_PREFIX}_armeabi-v7a.apk" \
            "$APK_DIR_PATH/${APK_BASENAME_PREFIX}_x86_64.apk" \
            "$APK_DIR_PATH/${APK_BASENAME_PREFIX}_x86.apk" \
            "$APK_DIR_PATH/${APK_BASENAME_PREFIX}_sha256sums"; then
            exit_on_error "Attach APKs to release failed for '$APK_VERSION_TAG' release."
          fi
