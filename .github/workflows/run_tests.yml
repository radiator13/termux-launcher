name: Test app

on:
  workflow_dispatch:


concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  testing:
    runs-on: ubuntu-latest
    steps:
    - name: Clone repository
      uses: actions/checkout@v6
    - name: Setup java 17
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'
    - name: Setup Gradle cache
      uses: gradle/actions/setup-gradle@v4
    - name: Execute tests and build-parity checks
      env:
        GRADLE_OPTS: >-
          -Dorg.gradle.internal.http.connectionTimeout=120000
          -Dorg.gradle.internal.http.socketTimeout=120000
        GRADLE_MAX_ATTEMPTS: "5"
        GRADLE_RETRY_SLEEP_SECONDS: "20"
        GRADLE_REFRESH_FROM_ATTEMPT: "2"
      run: |
        ./.github/scripts/gradle_retry.sh ./gradlew --no-daemon \
          :app:verifyReleaseHardening :app:testDebugUnitTest :terminal-emulator:test
        ./.github/scripts/gradle_retry.sh ./gradlew --no-daemon :app:assembleDebug
    - name: Upload test reports on failure
      if: failure()
      uses: actions/upload-artifact@v6
      with:
        name: test-reports-${{ github.run_id }}
        path: |
          app/build/reports/tests/
          app/build/test-results/
          terminal-emulator/build/reports/tests/
          terminal-emulator/build/test-results/
        if-no-files-found: warn
