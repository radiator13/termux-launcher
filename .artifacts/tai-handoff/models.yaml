# Per-model & global generation parameters
parameters:
  litert_lm:        # mirrors Edge Gallery
    max_tokens:   { default: 4000, range: [2000, 32000] }
    top_k:        { default: 64,   range: [5, 100] }
    top_p:        { default: 0.95, range: [0.0, 1.0] }
    temperature:  { default: 1.00, range: [0.0, 2.0] }
    accelerator:  { default: GPU,  options: [GPU, CPU] }
    enable_thinking: { default: false }
    enable_speculative_decoding: { default: false }
    system_prompt: { type: text }   # overrides global
  mlc_llm:
    accelerator:    { default: Auto, options: [Auto, CPU, GPU] }
    context_window: { default: 4096, range: [1024, 8192] }
    max_tokens:     { default: 1024, range: [256, 8192] }
    temperature:    { default: 0.70, range: [0.0, 2.0] }
    top_p:          { default: 0.95, range: [0.0, 1.0] }
    top_k:          { default: 64,   range: [5, 100] }
    system_prompt:  { type: text }  # overrides global
